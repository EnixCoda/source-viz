<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Rounded square background, matches theme_color in manifest -->
  <rect width="192" height="192" rx="36" fill="#2D3748"/>

  <!-- Arrowhead marker for directed edges -->
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#A0AEC0"/>
    </marker>
  </defs>

  <!-- Directed edges: top importers -> focal node -> bottom imports.
       Endpoints are pre-trimmed to sit at each circle's edge so the
       arrowheads don't overlap the node fill. -->
  <g stroke="#A0AEC0" stroke-width="3" stroke-linecap="round" fill="none"
     marker-end="url(#arrow)">
    <line x1="66.4"  y1="58.9"  x2="84.9"  y2="84.6"/>
    <line x1="125.6" y1="58.9"  x2="107.1" y2="84.6"/>
    <line x1="84.9"  y1="115.4" x2="66.4"  y2="141.1"/>
    <line x1="107.1" y1="115.4" x2="125.6" y2="141.1"/>
  </g>

  <!-- Outer nodes: smaller, muted -->
  <g fill="#CBD5E0">
    <circle cx="60"  cy="50"  r="10"/>
    <circle cx="132" cy="50"  r="10"/>
    <circle cx="60"  cy="150" r="10"/>
    <circle cx="132" cy="150" r="10"/>
  </g>

  <!-- Focal node: larger, accented blue with a soft ring to pop visually -->
  <circle cx="96" cy="100" r="22" fill="#4299E1"/>
  <circle cx="96" cy="100" r="22" fill="none" stroke="#90CDF4" stroke-width="3" opacity="0.7"/>
</svg>
